        * { margin: 0; padding: 0; box-sizing: border-box; }

            position: fixed; top: 20px; right: 20px; z-index: 100;

            padding: 8px 15px; background: rgba(0, 0, 20, 0.7);

    <script type="importmap">

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== 天文计算工具 ==========
        function getJulianDay(date) { return date.getTime() / 86400000 + 2440587.5; }
        
        function getGMST(date) {
            const JD = getJulianDay(date);
            const T = (JD - 2451545.0) / 36525.0;
            let gmst = 280.46061837 + 360.98564736629 * (JD - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000.0;
            gmst = gmst % 360;
            if (gmst < 0) gmst += 360;
            return gmst;
        }
        
        function getLST(date, longitude) {
            const gmst = getGMST(date);
            let lst = gmst + longitude;
            lst = lst % 360;
            if (lst < 0) lst += 360;
            return lst;
        }
        
        function equatorialToHorizontal(ra, dec, lat, lst) {
            const ha = lst - ra;
            const haRad = ha * Math.PI / 180;
            const decRad = dec * Math.PI / 180;
            const latRad = lat * Math.PI / 180;
            const sinAlt = Math.sin(decRad) * Math.sin(latRad) + Math.cos(decRad) * Math.cos(latRad) * Math.cos(haRad);
            const altitude = Math.asin(Math.max(-1, Math.min(1, sinAlt))) * 180 / Math.PI;
            
            // 安全计算方位角，避免NaN
            let azimuth = 0;
            const cosAlt = Math.cos(Math.asin(Math.max(-1, Math.min(1, sinAlt))));
            if (Math.abs(cosAlt) > 1e-10 && Math.abs(Math.cos(latRad)) > 1e-10) {
                const cosAz = (Math.sin(decRad) - Math.sin(latRad) * sinAlt) / (Math.cos(latRad) * cosAlt);
                azimuth = Math.acos(Math.max(-1, Math.min(1, cosAz))) * 180 / Math.PI;
                if (Math.sin(haRad) > 0) azimuth = 360 - azimuth;
            }
            
            return { altitude, azimuth };
        }
        
        function horizontalTo3D(altitude, azimuth, radius) {
            // 安全检查
            if (isNaN(altitude) || isNaN(azimuth)) {
                return { x: 0, y: -radius, z: 0 }; // 默认返回天底位置
            }
            const altRad = altitude * Math.PI / 180;
            const azRad = azimuth * Math.PI / 180;
            const y = Math.sin(altRad) * radius;
            const r_proj = Math.cos(altRad) * radius;
            const x = Math.sin(azRad) * r_proj;
            const z = Math.cos(azRad) * r_proj;
            return { x, y, z };
        }

        // ========== 行星位置计算（使用可靠的简化公式） ==========
        function getPlanetPosition(name, date) {
            const JD = getJulianDay(date);
            const d = JD - 2451545.0; // 从J2000起算的天数
            const T = d / 36525.0; // 儒略世纪数
            
            let ra, dec, mag, color, size;
            
            switch(name) {
                case '太阳': {
                    // 太阳黄经（简化公式）
                    const L = 280.46 + 0.9856474 * d;
                    const g = 357.528 + 0.9856003 * d; // 平近点角
                    const gRad = g * Math.PI / 180;
                    // 太阳黄经（考虑椭圆轨道修正）
                    const lambda = L + 1.915 * Math.sin(gRad) + 0.020 * Math.sin(2 * gRad);
                    // 黄赤交角
                    const epsilon = 23.439 - 0.0000004 * d;
                    const lambdaRad = lambda * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    // 转换为赤道坐标
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(lambdaRad) * Math.sin(epsilonRad)) * 180 / Math.PI;
                    mag = -26.7;
                    color = 0xffaa00;
                    size = 8;
                    break;
                }
                case '月亮': {
                    // 月亮位置（简化）
                    const L = 218.32 + 13.176396 * d;
                    const M = 134.96 + 13.064993 * d; // 平近点角
                    const MRad = M * Math.PI / 180;
                    const lambda = L + 6.29 * Math.sin(MRad);
                    const beta = 5.13 * Math.sin((93.3 + 13.064993 * d) * Math.PI / 180); // 黄纬
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilon = 23.439 - 0.0000004 * d;
                    const epsilonRad = epsilon * Math.PI / 180;
                    // 转换为赤道坐标
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = -12.7;
                    color = 0xdddddd;
                    size = 6;
                    break;
                }
                case '水星': {
                    const L = 252.25 + 4.092338 * d;
                    const lambda = L; // 简化：黄经 ≈ 平均黄经
                    const beta = 7.0 * Math.sin((L * 1.0 + 50) * Math.PI / 180); // 黄纬（简化）
                    const epsilon = 23.439;
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = -0.4;
                    color = 0xaaaaaa;
                    size = 2.5;
                    break;
                }
                case '金星': {
                    const L = 181.98 + 1.602130 * d;
                    const lambda = L;
                    const beta = 3.39 * Math.sin((L * 1.0 + 130) * Math.PI / 180);
                    const epsilon = 23.439;
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = -4.4;
                    color = 0xffeebb;
                    size = 4.5;
                    break;
                }
                case '火星': {
                    const L = 355.43 + 0.524033 * d;
                    const lambda = L;
                    const beta = 1.85 * Math.sin((L * 1.0 + 70) * Math.PI / 180);
                    const epsilon = 23.439;
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = -1.5;
                    color = 0xff6644;
                    size = 3.5;
                    break;
                }
                case '木星': {
                    const L = 34.35 + 0.083091 * d;
                    const lambda = L;
                    const beta = 1.31 * Math.sin((L * 1.0 + 200) * Math.PI / 180);
                    const epsilon = 23.439;
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = -2.5;
                    color = 0xddbb88;
                    size = 5.5;
                    break;
                }
                case '土星': {
                    const L = 50.08 + 0.033444 * d;
                    const lambda = L;
                    const beta = 2.49 * Math.sin((L * 1.0 + 300) * Math.PI / 180);
                    const epsilon = 23.439;
                    const lambdaRad = lambda * Math.PI / 180;
                    const betaRad = beta * Math.PI / 180;
                    const epsilonRad = epsilon * Math.PI / 180;
                    ra = Math.atan2(Math.sin(lambdaRad) * Math.cos(epsilonRad) - Math.tan(betaRad) * Math.sin(epsilonRad), Math.cos(lambdaRad)) * 180 / Math.PI;
                    dec = Math.asin(Math.sin(betaRad) * Math.cos(epsilonRad) + Math.cos(betaRad) * Math.sin(epsilonRad) * Math.sin(lambdaRad)) * 180 / Math.PI;
                    mag = 0.3;
                    color = 0xddcc88;
                    size = 5;
                    break;
                }
                default:
                    return null;
            }
            
            // 规范化
            ra = (ra + 360) % 360;
            if (ra < 0) ra += 360;
            
            return { ra, dec, mag, color, size };
        }

        // ========== 卫星数据 ==========
        const satellites = [

        ];

        // 模拟卫星位置
        function getSatellitePosition(name, date) {
            const seed = name.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const hours = date.getHours() + date.getMinutes() / 60;
            
            // 模拟卫星轨道周期约90分钟
            const orbitPhase = ((hours * 60 + seed) % 90) / 90;
            const ra = (orbitPhase * 360 + seed) % 360;
            const dec = Math.sin(orbitPhase * Math.PI * 2 + seed) * 51.6;
            const isVisible = Math.sin(orbitPhase * Math.PI * 2) > 0.3;
            
            return { ra, dec, mag: 1.0, color: 0x00ff88, size: 1.5, isVisible };
        }

        // ========== 星座连线 ==========
        const constellationLines = [

        // ========== Three.js 场景 ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        scene.fog = new THREE.FogExp2(0x000011, 0.00025);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);

        renderer.setSize(window.innerWidth, window.innerHeight);

        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.minDistance = 0.5;
        controls.maxDistance = 200;
        controls.zoomSpeed = 1.5;

        // ========== 背景星星 ==========
        function createBackgroundStars() {
            const count = 25000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 800 + Math.random() * 400;
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);
                const t = Math.random();
                if (t < 0.7) { colors[i3] = 0.85; colors[i3 + 1] = 0.90; colors[i3 + 2] = 1.0; }
                else if (t < 0.85) { colors[i3] = 0.70; colors[i3 + 1] = 0.80; colors[i3 + 2] = 1.0; }
                else { colors[i3] = 1.0; colors[i3 + 1] = 0.90; colors[i3 + 2] = 0.75; }
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const material = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.8, sizeAttenuation: true });
            return new THREE.Points(geometry, material);
        }
        const bgStars = createBackgroundStars();
        scene.add(bgStars);

        // ========== 流星系统 ==========
        const meteors = [];
        function createMeteor() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(6);
            const startAz = Math.random() * 360;
            const startAlt = 40 + Math.random() * 40;
            const endAz = startAz + (Math.random() - 0.5) * 30;
            const endAlt = startAlt - 10 - Math.random() * 20;
            const r = 600;
            const start = horizontalTo3D(startAlt, startAz, r);
            const end = horizontalTo3D(endAlt, endAz, r);
            positions[0] = start.x; positions[1] = start.y; positions[2] = start.z;
            positions[3] = end.x; positions[4] = end.y; positions[5] = end.z;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 0.8 });
            const meteor = new THREE.Line(geometry, material);
            scene.add(meteor);
            return { mesh: meteor, life: 1.0, speed: 0.02 + Math.random() * 0.03 };
        }

        // ========== 渲染星空 ==========
        let userLat = 39.9, userLon = 116.4;
        let timeOffset = 0;
        let starMeshes = [], lineMeshes = [], starPositions = {};
        let allObjects = []; // 当前可见的天体（用于3D渲染）
        let fullObjectDB = []; // 完整天体数据库（包含所有天体，用于搜索和列表）
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 构建完整天体数据库（只构建一次）
        function buildFullObjectDB() {
            const db = [];
            
            // 添加所有恒星
            allStars.forEach(star => {
                db.push({
                    name: star.name,
                    ra: star.ra,
                    dec: star.dec,
                    mag: star.mag,
                    type: '恒星',
                    constellation: star.constellation
                });
            });
            
            // 添加行星（使用占位符，实际位置在renderSky中计算）
            const planetNames = ['太阳', '月亮', '水星', '金星', '火星', '木星', '土星'];
            planetNames.forEach(name => {
                db.push({
                    name: name,
                    type: '行星',
                    isPlanet: true
                });
            });
            
            // 添加卫星
            satellites.forEach(sat => {
                db.push({
                    name: sat.name,
                    type: sat.type,
                    isSatellite: true
                });
            });
            
            return db;
        }

        function renderSky() {
            // 清除旧物体
            starMeshes.forEach(m => scene.remove(m));
            lineMeshes.forEach(m => scene.remove(m));
            starMeshes = [];
            lineMeshes = [];
            starPositions = {};
            allObjects = [];

            const now = new Date();
            now.setHours(now.getHours() + timeOffset);
            const lst = getLST(now, userLon);
            const visibleConstellations = new Set();

            document.getElementById('lat').textContent = userLat.toFixed(2);
            document.getElementById('lon').textContent = userLon.toFixed(2);
            document.getElementById('local-time').textContent = now.toLocaleString('zh-CN');

            // 渲染恒星
            allStars.forEach(star => {
                const { altitude, azimuth } = equatorialToHorizontal(star.ra, star.dec, userLat, lst);
                if (altitude < -5) return;
                visibleConstellations.add(star.constellation);
                const pos = horizontalTo3D(altitude, azimuth, 500);
                const size = Math.max(0.4, (4.5 - star.mag) * 0.35);
                const geometry = new THREE.SphereGeometry(size, 16, 16);
                const material = new THREE.MeshBasicMaterial({ 
                    color: star.mag < 0 ? 0xaaddff : 0xffffff, 
                    transparent: true, 
                    opacity: Math.min(1, (5 - star.mag) / 4) 
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.userData = { 
                    name: star.name, 
                    mag: star.mag, 
                    constellation: star.constellation, 
                    altitude, 
                    azimuth, 
                    type: '恒星' 
                };
                scene.add(mesh);
                starMeshes.push(mesh);
                starPositions[star.name] = pos;
                allObjects.push({ 
                    name: star.name, 
                    altitude, 
                    azimuth, 
                    mag: star.mag, 
                    type: '恒星', 
                    constellation: star.constellation 
                });
                
                // 亮星光晕
                if (star.mag < 1.5) {
                    const glowGeo = new THREE.SphereGeometry(size * 4, 16, 16);
                    const glowMat = new THREE.MeshBasicMaterial({ 
                        color: 0x88aaff, 
                        transparent: true, 
                        opacity: 0.06 
                    });
                    const glow = new THREE.Mesh(glowGeo, glowMat);
                    glow.position.copy(mesh.position);
                    scene.add(glow);
                    starMeshes.push(glow);
                }
            });

            // 渲染星座连线
            constellationLines.forEach(([name1, name2]) => {
                const pos1 = starPositions[name1];
                const pos2 = starPositions[name2];
                if (!pos1 || !pos2) return;
                const points = [
                    new THREE.Vector3(pos1.x, pos1.y, pos1.z), 
                    new THREE.Vector3(pos2.x, pos2.y, pos2.z)
                ];
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ 
                    color: 0x4466aa, 
                    transparent: true, 
                    opacity: 0.4 
                });
                const line = new THREE.Line(geometry, material);
                scene.add(line);
                lineMeshes.push(line);
            });

            // 渲染行星
            const planetNames = ['太阳', '月亮', '水星', '金星', '火星', '木星', '土星'];
            planetNames.forEach(name => {
                try {
                    const planet = getPlanetPosition(name, now);
                    if (!planet) return;
                    
                    const { altitude, azimuth } = equatorialToHorizontal(planet.ra, planet.dec, userLat, lst);
                    
                    // 更新完整数据库中该行星的信息
                    const dbEntry = fullObjectDB.find(o => o.name === name);
                    if (dbEntry) {
                        dbEntry.ra = planet.ra;
                        dbEntry.dec = planet.dec;
                        dbEntry.mag = planet.mag;
                        dbEntry.altitude = altitude;
                        dbEntry.azimuth = azimuth;
                        dbEntry.isVisible = altitude > -10;
                    }
                    
                    if (altitude < -10) return;
                    
                    const pos = horizontalTo3D(altitude, azimuth, 500);
                    const geometry = new THREE.SphereGeometry(planet.size, 32, 32);
                    const material = new THREE.MeshBasicMaterial({ color: planet.color });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(pos.x, pos.y, pos.z);
                    mesh.userData = { 
                        name, 
                        mag: planet.mag, 
                        altitude, 
                        azimuth, 
                        type: '行星' 
                    };
                    scene.add(mesh);
                    starMeshes.push(mesh);
                    allObjects.push({ name, altitude, azimuth, mag: planet.mag, type: '行星' });

                    // 太阳发光效果
                    if (name === '太阳') {
                        const glowGeo = new THREE.SphereGeometry(planet.size * 6, 32, 32);
                        const glowMat = new THREE.MeshBasicMaterial({ 
                            color: 0xffaa00, 
                            transparent: true, 
                            opacity: 0.15 
                        });
                        const glow = new THREE.Mesh(glowGeo, glowMat);
                        glow.position.copy(mesh.position);
                        scene.add(glow);
                        starMeshes.push(glow);
                        document.getElementById('sun-alt').textContent = altitude.toFixed(1);
                    }
                    
                    // 月亮光晕
                    if (name === '月亮') {
                        const glowGeo = new THREE.SphereGeometry(planet.size * 3, 32, 32);
                        const glowMat = new THREE.MeshBasicMaterial({ 
                            color: 0xffffff, 
                            transparent: true, 
                            opacity: 0.1 
                        });
                        const glow = new THREE.Mesh(glowGeo, glowMat);
                        glow.position.copy(mesh.position);
                        scene.add(glow);
                        starMeshes.push(glow);
                    }
                } catch (e) {
                    console.warn(`渲染行星 ${name} 时出错:`, e);
                }
            });

            // 渲染人造卫星
            satellites.forEach(sat => {
                try {
                    const satPos = getSatellitePosition(sat.name, now);
                    
                    const { altitude, azimuth } = equatorialToHorizontal(satPos.ra, satPos.dec, userLat, lst);
                    
                    // 更新完整数据库中该卫星的信息
                    const dbEntry = fullObjectDB.find(o => o.name === sat.name);
                    if (dbEntry) {
                        dbEntry.ra = satPos.ra;
                        dbEntry.dec = satPos.dec;
                        dbEntry.mag = satPos.mag;
                        dbEntry.altitude = altitude;
                        dbEntry.azimuth = azimuth;
                        dbEntry.isVisible = satPos.isVisible && altitude > 10;
                    }
                    
                    if (!satPos.isVisible || altitude < 10) return;
                    
                    const pos = horizontalTo3D(altitude, azimuth, 480);
                    const geometry = new THREE.SphereGeometry(satPos.size, 16, 16);
                    const material = new THREE.MeshBasicMaterial({ color: satPos.color });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(pos.x, pos.y, pos.z);
                    mesh.userData = { 
                        name: sat.name, 
                        mag: satPos.mag, 
                        altitude, 
                        azimuth, 
                        type: sat.type 
                    };
                    scene.add(mesh);
                    starMeshes.push(mesh);
                    allObjects.push({ 
                        name: sat.name, 
                        altitude, 
                        azimuth, 
                        mag: satPos.mag, 
                        type: sat.type 
                    });

                    // 卫星闪烁效果
                    const glowGeo = new THREE.SphereGeometry(satPos.size * 2, 16, 16);
                    const glowMat = new THREE.MeshBasicMaterial({ 
                        color: 0x00ff88, 
                        transparent: true, 
                        opacity: 0.2 
                    });
                    const glow = new THREE.Mesh(glowGeo, glowMat);
                    glow.position.copy(mesh.position);
                    scene.add(glow);
                    starMeshes.push(glow);
                } catch (e) {
                    console.warn(`渲染卫星 ${sat.name} 时出错:`, e);
                }
            });

            // 更新可见天体列表
            const visibleCount = allObjects.filter(o => o.altitude > 0).length;
            document.getElementById('visible-objects').textContent = visibleCount + ' 个';
            updateObjectList();

            // 设置相机朝向南方
            const southPos = horizontalTo3D(20, 180, 10);
            camera.position.set(0, 1.6, 0);
            camera.lookAt(southPos.x, southPos.y, southPos.z);
            controls.target.set(southPos.x, southPos.y, southPos.z);
            controls.update();
        }

        // ========== 天体列表更新 ==========
        function updateObjectList() {
            const list = document.getElementById('object-list-content');
            list.innerHTML = '';
            
            // 显示所有天体（包括地平线以下的），按类型分组
            const sorted = fullObjectDB
                .filter(o => o.altitude !== undefined) // 只显示已计算过位置的天体
                .sort((a, b) => (b.altitude || -90) - (a.altitude || -90));
            
            sorted.forEach(obj => {
                const div = document.createElement('div');
                div.className = 'obj-item';
                const icon = obj.type === '行星' ? '🪐' : 
                            obj.type === '人造卫星' ? '🛰️' : '⭐';
                const altText = obj.altitude !== undefined ? `${obj.altitude.toFixed(0)}°` : '--';
                const visibleMark = obj.altitude > 0 ? '' : ' 🔒';
                div.innerHTML = `${icon} ${obj.name} <span style="color:#8899aa">(${altText})</span>${visibleMark}`;
                div.style.opacity = obj.altitude > 0 ? '1' : '0.5';
                div.addEventListener('click', () => searchObject(obj.name));
                list.appendChild(div);
            });
        }

        document.getElementById('toggle-list').addEventListener('click', () => {
            const list = document.getElementById('object-list');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
        });

        // ========== 搜索功能 ==========
        function searchObject(name) {
            // 在完整数据库中搜索
            const obj = fullObjectDB.find(o => o.name.includes(name));
            if (!obj) { alert('未找到该天体'); return; }
            
            if (obj.altitude === undefined) {
                alert(`${obj.name} 位置尚未计算`);
                return;
            }
            
            if (obj.altitude < 0) {
                alert(`${obj.name} 当前在地平线以下 (${obj.altitude.toFixed(1)}°)，无法定位`);
                return;
            }
            
            const pos = horizontalTo3D(obj.altitude, obj.azimuth, 500);
            controls.target.set(pos.x, pos.y, pos.z);
            controls.update();
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            const name = document.getElementById('star-search').value;
            if (name) searchObject(name);
        });
        
        document.getElementById('star-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const name = document.getElementById('star-search').value;
                if (name) searchObject(name);
            }
        });

        // ========== 时间控制 ==========
        document.getElementById('time-slider').addEventListener('input', (e) => {
            timeOffset = parseFloat(e.target.value);
            document.getElementById('time-offset').textContent = 
                (timeOffset >= 0 ? '+' : '') + timeOffset + 'h';
            renderSky();
        });
        
        document.getElementById('reset-time').addEventListener('click', () => {
            timeOffset = 0;
            document.getElementById('time-slider').value = 0;
            document.getElementById('time-offset').textContent = '0h';
            renderSky();
        });

        // ========== 鼠标交互 ==========
        const tooltip = document.getElementById('tooltip');
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(
                starMeshes.filter(m => m.userData.name)
            );
            
            if (intersects.length > 0) {
                const obj = intersects[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                const icon = obj.type === '行星' ? '🪐' : 
                            obj.type === '人造卫星' ? '🛰️' : '⭐';
                tooltip.innerHTML = `${icon} <strong>${obj.name}</strong><br>类型: ${obj.type}<br>高度角: ${obj.altitude.toFixed(1)}°<br>方位角: ${obj.azimuth.toFixed(1)}°`;
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }
        window.addEventListener('mousemove', onMouseMove);

        // ========== 地理位置 ==========
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { 
                    resolve({ lat: userLat, lon: userLon }); 
                    return; 
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => { 
                        userLat = pos.coords.latitude; 
                        userLon = pos.coords.longitude; 
                        resolve({ lat: userLat, lon: userLon }); 
                    },
                    () => { resolve({ lat: userLat, lon: userLon }); },
                    { timeout: 10000, enableHighAccuracy: false }
                );
            });
        }

        // ========== 初始化 ==========
        async function init() {
            // 构建完整天体数据库
            fullObjectDB = buildFullObjectDB();
            
            const startBtn = document.getElementById('start-btn');
            startBtn.style.display = 'inline-block';
            startBtn.addEventListener('click', async () => {
                startBtn.disabled = true; 
                startBtn.textContent = '正在获取位置...';
                try { 
                    await getLocation(); 
                    document.getElementById('location-status').textContent = `位置已获取`; 
                    document.getElementById('location-status').style.color = '#66ff99'; 
                }
                catch (e) { 
                    document.getElementById('location-status').textContent = '使用默认位置（北京）'; 
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'block';
                renderSky(); 
                animate();
            });
        }

        // ========== 动画 ==========
        let time = 0;
        const originalColors = bgStars.geometry.attributes.color.array.slice();
        
        function animate() {
            requestAnimationFrame(animate); 
            time += 0.001;
            bgStars.rotation.y += 0.00003;
            
            const colors = bgStars.geometry.attributes.color.array;
            for (let i = 0; i < 30; i++) {
                const idx = Math.floor(Math.random() * 25000);
                const i3 = idx * 3;
                const twinkle = 0.7 + 0.3 * Math.sin(time * 2 + idx * 0.1);
                colors[i3] = originalColors[i3] * twinkle;
                colors[i3 + 1] = originalColors[i3 + 1] * twinkle;
                colors[i3 + 2] = originalColors[i3 + 2] * twinkle;
            }
            bgStars.geometry.attributes.color.needsUpdate = true;
            
            if (Math.random() < 0.005 && meteors.length < 3) {
                meteors.push(createMeteor());
            }
            
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.life -= m.speed;
                m.mesh.material.opacity = m.life;
                if (m.life <= 0) { 
                    scene.remove(m.mesh); 
                    meteors.splice(i, 1); 
                }
            }
            
            controls.update(); 
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
